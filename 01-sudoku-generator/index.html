<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Puzzle Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="top-panel">
      <div>
        <p class="eyebrow">Puzzle Generator</p>
        <h1>Sudoku</h1>
      </div>

      <div class="controls" aria-label="Puzzle controls">
        <label class="select-wrap">
          <span>Difficulty</span>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>

        <button id="newPuzzleBtn" type="button">New Puzzle</button>
        <button id="checkBtn" type="button" class="secondary">Check Solution</button>
        <button id="clearBtn" type="button" class="secondary">Clear Entries</button>
      </div>
    </section>

    <section class="game-layout">
      <div class="board-wrap" aria-label="Sudoku board">
        <div id="board" class="sudoku-board"></div>
      </div>

      <aside class="side-panel">
        <div class="status-card">
          <h2>Status</h2>
          <p id="message">Choose a cell, then enter a number from 1 to 9.</p>
        </div>

        <div class="number-pad" aria-label="Number input">
          <button type="button" data-number="1">1</button>
          <button type="button" data-number="2">2</button>
          <button type="button" data-number="3">3</button>
          <button type="button" data-number="4">4</button>
          <button type="button" data-number="5">5</button>
          <button type="button" data-number="6">6</button>
          <button type="button" data-number="7">7</button>
          <button type="button" data-number="8">8</button>
          <button type="button" data-number="9">9</button>
          <button type="button" id="eraseBtn" class="erase">Erase</button>
        </div>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
